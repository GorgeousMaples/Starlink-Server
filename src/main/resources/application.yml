spring:
  application:
    name: starlink
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/starlink?useSSL=false&serverTimezone=UTC
    username: starlink
    password: starlink123
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  address: 0.0.0.0
  port: 8000
file:
  image-path: D:/Unity/images/

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token前缀
#  token-prefix: "Bearer"
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # jwt秘钥
#  jwt-secret-key: spring

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted     # 指定逻辑删除字段名
      logic-delete-value: 1             # 逻辑已删除值
      logic-not-delete-value: 0         # 逻辑未删除值

#spring.devtools.restart.enable=true
#spring.devtools.restart.additional-path=src/main/java